<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Temu ربح">
<meta name="theme-color" content="#f59e0b">
<link rel="manifest" href="manifest.json">
<title>مدير أرباح Temu - مع الصور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0f; --surface: #151520; --surface2: #1e1e2e; --surface3: #2a2a3c;
    --border: rgba(255,255,255,0.06); --text: #f0f0f5; --muted: #6b7280;
    --green: #10b981; --blue: #3b82f6; --red: #ef4444; --amber: #f59e0b; --purple: #8b5cf6;
    --radius: 18px;
  }
  body.light-mode {
    --bg: #f5f5f7; --surface: #ffffff; --surface2: #f0f0f5; --surface3: #e5e5ea;
    --border: rgba(0,0,0,0.08); --text: #1a1a2e; --muted: #8e8e93;
  }
  body {
    font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
    padding-bottom: 85px; transition: 0.3s;
  }
  .header {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border-bottom: 1px solid var(--border); padding: 1rem;
    position: sticky; top: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 18px; font-weight: 800; }
  .header h1 span { color: var(--amber); }
  .theme-toggle {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 50%; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer;
  }
  .tabs {
    display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 60px; z-index: 40; padding: 8px; gap: 8px;
  }
  .tab {
    flex: 1; padding: 10px; font-weight: 700; font-size: 13px;
    background: transparent; border-radius: 12px; cursor: pointer;
    text-align: center; color: var(--muted);
  }
  .tab.active { color: #000; background: var(--amber); box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
  .page { display: none; padding: 1rem; animation: fadeIn 0.2s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .stat {
    background: linear-gradient(145deg, var(--surface), var(--surface2));
    border: 1px solid var(--border); border-radius: 16px; padding: 14px;
  }
  .stat.wide { grid-column: 1/-1; display: flex; justify-content: space-between; }
  .stat-label { font-size: 11px; color: var(--muted); font-weight: 700; }
  .stat-val { font-size: 20px; font-weight: 800; margin-top: 4px; }
  .stat-val.g { color: var(--green); } .stat-val.r { color: var(--red); } .stat-val.b { color: var(--blue); }
  .order-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .order-header { display: flex; justify-content: space-between; align-items: start; }
  .order-customer { font-weight: 800; font-size: 16px; }
  .order-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: 700; display: inline-block; margin-top: 6px; }
  .status-completed { background: rgba(16,185,129,0.15); color: var(--green); }
  .status-pending { background: rgba(245,158,11,0.15); color: var(--amber); }
  .status-cancelled { background: rgba(239,68,68,0.15); color: var(--red); }
  .order-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .o-cell { background: var(--surface2); padding: 8px; border-radius: 10px; text-align: center; }
  .order-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-mini { flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: 700; font-size: 12px; cursor: pointer; color: #fff; }
  .btn-edit { background: var(--blue); } .btn-clone { background: var(--purple); } .btn-del { background: var(--surface3); color: var(--muted); }
  .form-group { margin-bottom: 14px; }
  .form-input, .form-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; color: var(--text); font-size: 15px;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-main {
    width: 100%; padding: 16px; background: var(--blue); color: #fff;
    border: none; border-radius: 14px; font-weight: 800; cursor: pointer;
  }
  .fab-add {
    position: fixed; bottom: 20px; left: 20px;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), #2563eb);
    color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(37,99,235,0.5); cursor: pointer; z-index: 100;
  }
  .ai-btn {
    position: fixed; bottom: 20px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), #7c3aed);
    color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 100;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px); z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-content {
    background: var(--surface); width: 100%; max-width: 500px;
    border-radius: 24px 24px 0 0; padding: 20px;
    max-height: 85vh; overflow-y: auto;
  }
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--surface); color: var(--text); padding: 10px 20px;
    border-radius: 30px; font-size: 14px; font-weight: 600;
    transition: 0.3s; z-index: 300; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .hidden { display: none; }
  .image-preview-area {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
  }
  .preview-img {
    width: 60px; height: 60px; object-fit: cover; border-radius: 8px;
    border: 1px solid var(--border); cursor: pointer;
  }
  .order-images {
    display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
  }
  .order-img {
    width: 50px; height: 50px; object-fit: cover; border-radius: 6px;
    border: 1px solid var(--border); cursor: pointer;
  }
  .img-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    z-index: 500; display: none; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .img-modal img { max-width: 90%; max-height: 90%; border-radius: 12px; }
  @media (max-width: 400px) { .stats { grid-template-columns: 1fr; } .stat.wide { flex-direction: column; gap: 10px; } }
</style>
</head>
<body>

<div class="header">
  <div><h1>تتبع <span>Temu</span></h1><p id="orderCount">0 طلب</p></div>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchPage('home',event)">🏠 الرئيسية</button>
  <button class="tab" onclick="switchPage('stats',event)">📊 الإحصائيات</button>
  <button class="tab" onclick="switchPage('settings',event)">⚙️ الإعدادات</button>
</div>

<!-- صفحة الرئيسية -->
<div id="homePage" class="page active">
  <div class="stats">
    <div class="stat"><div class="stat-label">المبيعات</div><div class="stat-val b" id="totalSales">0</div></div>
    <div class="stat"><div class="stat-label">الربح الصافي</div><div class="stat-val g" id="totalProfit">0</div></div>
    <div class="stat wide"><div><div class="stat-label">التكلفة</div><div class="stat-val r" id="totalCost">0</div></div>
    <div><div class="stat-label">صافي الكاش</div><div class="stat-val" style="color:var(--amber)" id="netCash">0</div></div></div>
  </div>
  <div style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;">
    <button class="tab" style="flex:none; padding:6px 12px;" onclick="setFilter('all',this)">الكل</button>
    <button class="tab" style="flex:none; padding:6px 12px;" onclick="setFilter('completed',this)">مكتمل</button>
    <button class="tab" style="flex:none; padding:6px 12px;" onclick="setFilter('pending',this)">قيد الانتظار</button>
    <button class="tab" style="flex:none; padding:6px 12px;" onclick="setFilter('today',this)">اليوم</button>
  </div>
  <div id="ordersList"></div>
  <div id="emptyMsg" class="hidden" style="text-align:center; padding:40px; color:var(--muted);">📭 لا توجد طلبات</div>
</div>

<!-- صفحة الإحصائيات -->
<div id="statsPage" class="page">
  <div class="stat wide" style="margin-bottom:15px;"><div><div class="stat-label">أفضل زبون</div><div id="bestCustomer" class="stat-val">-</div></div>
  <div><div class="stat-label">متوسط الربح</div><div id="avgProfit" class="stat-val g">0</div></div></div>
  <div style="background:var(--surface); padding:15px; border-radius:16px;">
    <h3 style="font-size:14px;">توزيع الحالات</h3>
    <div style="display:flex; height:8px; border-radius:5px; overflow:hidden; margin:10px 0;">
      <div id="barDone" style="background:var(--green); width:0%"></div>
      <div id="barPending" style="background:var(--amber); width:0%"></div>
      <div id="barCancel" style="background:var(--red); width:0%"></div>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>✅ مكتمل</span><span>⏳ انتظار</span><span>❌ ملغي</span></div>
  </div>
</div>

<!-- صفحة الإعدادات -->
<div id="settingsPage" class="page">
  <button class="btn-main" onclick="exportData()" style="background:var(--green); margin-bottom:10px;">📥 تصدير البيانات</button>
  <button class="btn-main" onclick="document.getElementById('importFile').click()" style="background:var(--blue);">📂 استيراد ملف JSON</button>
  <input type="file" id="importFile" accept=".json" hidden onchange="importData(this)">
  <button class="btn-main" onclick="resetAll()" style="background:var(--red); margin-top:20px;">🗑️ حذف الكل</button>
</div>

<button class="fab-add" onclick="openOrderModal()">+</button>
<button class="ai-btn" onclick="openAIModal()">🤖</button>

<!-- مودال إضافة/تعديل -->
<div id="orderModal" class="modal-overlay">
  <div class="modal-content">
    <h2 id="modalTitle" style="margin-bottom:15px;">طلب جديد</h2>
    <input type="hidden" id="editId">
    <div class="form-group"><input type="text" id="customerName" class="form-input" placeholder="اسم الزبون"></div>
    <div class="row"><div class="form-group"><input type="number" id="price" class="form-input" placeholder="سعر البيع" oninput="calcProfit()"></div>
    <div class="form-group"><input type="number" id="cost" class="form-input" placeholder="تكلفة المنتج" oninput="calcProfit()"></div></div>
    <div class="form-group"><input type="number" id="shipping" class="form-input" placeholder="تكلفة الشحن" value="0" oninput="calcProfit()"></div>
    <div class="row"><div class="form-group"><input type="date" id="date" class="form-input"></div>
    <div class="form-group"><select id="status" class="form-select"><option value="completed">مكتمل</option><option value="pending">قيد الانتظار</option><option value="cancelled">ملغي</option></select></div></div>
    
    <!-- رفع الصور -->
    <div class="form-group">
      <label class="stat-label">صور المنتج (اختياري)</label>
      <input type="file" id="productImages" accept="image/*" multiple class="form-input" onchange="previewImages(event)">
      <div class="image-preview-area" id="imagePreview"></div>
    </div>

    <div style="background:var(--surface2); padding:10px; border-radius:12px; margin:10px 0; display:flex; justify-content:space-between;"><span>الربح المتوقع:</span><span id="liveProfit" style="font-weight:800; color:var(--green)">0</span></div>
    <button class="btn-main" onclick="saveOrder()">💾 حفظ</button>
    <button class="btn-main" onclick="closeModal('orderModal')" style="background:var(--surface3); margin-top:8px;">إلغاء</button>
  </div>
</div>

<!-- مودال المساعد الذكي -->
<div id="aiModal" class="modal-overlay" style="align-items:center;">
  <div class="modal-content" style="border-radius:24px;">
    <h3>🤖 المساعد الذكي</h3>
    <div id="chatBox" style="height:250px; overflow-y:auto; margin:10px 0; display:flex; flex-direction:column; gap:8px;"></div>
    <div style="display:flex; gap:8px;"><input type="text" id="chatInput" class="form-input" placeholder="اسأل عن الأرباح..." onkeypress="if(event.key==='Enter') askAI()"><button class="btn-main" style="width:auto; padding:0 20px;" onclick="askAI()">إرسال</button></div>
  </div>
</div>

<!-- مودال عرض الصور المكبرة -->
<div id="imageViewer" class="img-modal" onclick="closeImageViewer()">
  <img id="viewerImg" src="">
</div>

<div id="toastMsg" class="toast">تم الحفظ</div>

<script>
  // ------------------- أفضل سكريبت مع الصور -------------------
  let orders = [];
  let currentFilter = 'all';
  let currentPage = 'home';
  let tempImages = []; // لتخزين الصور المؤقتة أثناء التعديل/الإضافة

  // تحميل البيانات
  function loadData() {
    try {
      const saved = localStorage.getItem('temu_pro_data');
      if(saved) orders = JSON.parse(saved);
      if(!Array.isArray(orders)) orders = [];
    } catch(e) { orders = []; }
    renderAll();
  }

  function saveData() { localStorage.setItem('temu_pro_data', JSON.stringify(orders)); }

  function renderAll() {
    renderStats();
    renderOrdersList();
    updateOrderCount();
  }

  function renderStats() {
    let totalSales = 0, totalCost = 0, totalProfit = 0;
    const customerSales = {};
    let completedCount = 0, pendingCount = 0, cancelledCount = 0;
    for(let o of orders) {
      if(o.status !== 'cancelled') {
        totalSales += o.price;
        totalCost += (o.cost + (o.shipping||0));
        customerSales[o.customer] = (customerSales[o.customer]||0) + o.price;
      }
      if(o.status === 'completed') { totalProfit += (o.price - (o.cost + (o.shipping||0))); completedCount++; }
      else if(o.status === 'pending') pendingCount++;
      else if(o.status === 'cancelled') cancelledCount++;
    }
    document.getElementById('totalSales').innerText = totalSales.toFixed(2);
    document.getElementById('totalCost').innerText = totalCost.toFixed(2);
    document.getElementById('totalProfit').innerText = totalProfit.toFixed(2);
    document.getElementById('netCash').innerText = totalProfit.toFixed(2);
    let best = Object.entries(customerSales).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('bestCustomer').innerText = best ? `${best[0]} (${best[1].toFixed(0)})` : '-';
    let avg = completedCount ? (totalProfit/completedCount).toFixed(2) : 0;
    document.getElementById('avgProfit').innerText = avg;
    let total = orders.length || 1;
    document.getElementById('barDone').style.width = (completedCount/total*100)+'%';
    document.getElementById('barPending').style.width = (pendingCount/total*100)+'%';
    document.getElementById('barCancel').style.width = (cancelledCount/total*100)+'%';
  }

  function renderOrdersList() {
    let filtered = orders;
    if(currentFilter === 'today') {
      const today = new Date().toISOString().slice(0,10);
      filtered = orders.filter(o => o.date === today);
    } else if(currentFilter !== 'all') filtered = orders.filter(o => o.status === currentFilter);
    const container = document.getElementById('ordersList');
    const emptyMsg = document.getElementById('emptyMsg');
    if(filtered.length === 0) { container.innerHTML = ''; emptyMsg.classList.remove('hidden'); return; }
    emptyMsg.classList.add('hidden');
    container.innerHTML = filtered.map(o => {
      const imagesHtml = (o.images && o.images.length) ? 
        `<div class="order-images">${o.images.map((img, idx) => `<img src="${img}" class="order-img" onclick="event.stopPropagation(); showImage('${img}')">`).join('')}</div>` : '';
      return `
      <div class="order-card">
        <div class="order-header"><div><div class="order-customer">${escapeHtml(o.customer)}</div><div class="order-date">📅 ${o.date}</div></div>
        <div><div class="status-badge status-${o.status}">${o.status === 'completed' ? 'مكتمل' : (o.status==='pending'?'قيد الانتظار':'ملغي')}</div><div style="font-weight:800; color:var(--green); margin-top:4px;">+${(o.price - (o.cost+(o.shipping||0))).toFixed(2)}</div></div></div>
        <div class="order-grid"><div class="o-cell"><span class="stat-label">البيع</span><div>${o.price.toFixed(2)}</div></div>
        <div class="o-cell"><span class="stat-label">التكلفة</span><div>${(o.cost+(o.shipping||0)).toFixed(2)}</div></div></div>
        ${imagesHtml}
        <div class="order-actions"><button class="btn-mini btn-edit" onclick="editOrder(${o.id})">✏️ تعديل</button>
        <button class="btn-mini btn-clone" onclick="cloneOrder(${o.id})">📄 نسخ</button>
        <button class="btn-mini btn-del" onclick="deleteOrder(${o.id})">🗑️ حذف</button></div>
      </div>`}).join('');
  }

  function updateOrderCount() { document.getElementById('orderCount').innerText = orders.length + ' طلب'; }

  function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;'); }); }

  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('#homePage .tabs:first-of-type .tab').forEach(t => t.classList.remove('active'));
    if(btn) btn.classList.add('active');
    renderOrdersList();
  }

  function switchPage(page, ev) {
    currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page+'Page').classList.add('active');
    document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
    ev.target.classList.add('active');
    if(page === 'stats') renderStats();
  }

  // معالجة الصور
  function previewImages(event) {
    const files = Array.from(event.target.files);
    tempImages = [];
    const previewDiv = document.getElementById('imagePreview');
    previewDiv.innerHTML = '';
    for(let file of files) {
      if(!file.type.startsWith('image/')) continue;
      const reader = new FileReader();
      reader.onload = function(e) {
        tempImages.push(e.target.result);
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview-img';
        previewDiv.appendChild(img);
      };
      reader.readAsDataURL(file);
    }
  }

  function openOrderModal(editId = null) {
    tempImages = [];
    document.getElementById('imagePreview').innerHTML = '';
    document.getElementById('productImages').value = '';
    if(editId) {
      const order = orders.find(o => o.id === editId);
      if(order) {
        document.getElementById('editId').value = order.id;
        document.getElementById('customerName').value = order.customer;
        document.getElementById('price').value = order.price;
        document.getElementById('cost').value = order.cost;
        document.getElementById('shipping').value = order.shipping || 0;
        document.getElementById('date').value = order.date;
        document.getElementById('status').value = order.status;
        document.getElementById('modalTitle').innerText = 'تعديل الطلب';
        // عرض الصور القديمة في المعاينة
        if(order.images && order.images.length) {
          tempImages = [...order.images];
          const previewDiv = document.getElementById('imagePreview');
          previewDiv.innerHTML = '';
          order.images.forEach(imgSrc => {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = 'preview-img';
            previewDiv.appendChild(img);
          });
        }
      }
    } else {
      document.getElementById('editId').value = '';
      document.getElementById('customerName').value = '';
      document.getElementById('price').value = '';
      document.getElementById('cost').value = '';
      document.getElementById('shipping').value = '0';
      document.getElementById('date').value = new Date().toISOString().slice(0,10);
      document.getElementById('status').value = 'completed';
      document.getElementById('modalTitle').innerText = 'طلب جديد';
    }
    calcProfit();
    document.getElementById('orderModal').classList.add('open');
  }

  function saveOrder() {
    const id = document.getElementById('editId').value;
    const customer = document.getElementById('customerName').value.trim();
    const price = parseFloat(document.getElementById('price').value);
    const cost = parseFloat(document.getElementById('cost').value) || 0;
    const shipping = parseFloat(document.getElementById('shipping').value) || 0;
    const date = document.getElementById('date').value;
    const status = document.getElementById('status').value;
    if(!customer || isNaN(price)) { showToast('أدخل الاسم والسعر', 'error'); return; }
    const totalCost = cost + shipping;
    const profit = price - totalCost;
    // الصور: نأخذ إما الصور الجديدة المرفوعة (tempImages) أو الصور القديمة المحفوظة
    let images = tempImages.filter(img => img.startsWith('data:image'));
    const orderData = { 
      id: id ? parseInt(id) : Date.now(), 
      customer, price, cost, shipping, totalCost, profit, date, status,
      images: images
    };
    if(id) {
      const index = orders.findIndex(o => o.id === parseInt(id));
      if(index !== -1) orders[index] = orderData;
    } else orders.unshift(orderData);
    saveData();
    renderAll();
    closeModal('orderModal');
    showToast(id ? 'تم التعديل' : 'تمت الإضافة');
  }

  function editOrder(id) { openOrderModal(id); }
  function cloneOrder(id) {
    const order = orders.find(o => o.id === id);
    if(order) {
      openOrderModal();
      document.getElementById('customerName').value = order.customer;
      document.getElementById('price').value = order.price;
      document.getElementById('cost').value = order.cost;
      document.getElementById('shipping').value = order.shipping || 0;
      document.getElementById('date').value = new Date().toISOString().slice(0,10);
      document.getElementById('status').value = 'pending';
      // نسخ الصور أيضاً
      tempImages = (order.images && order.images.length) ? [...order.images] : [];
      const previewDiv = document.getElementById('imagePreview');
      previewDiv.innerHTML = '';
      tempImages.forEach(imgSrc => {
        const img = document.createElement('img');
        img.src = imgSrc;
        img.className = 'preview-img';
        previewDiv.appendChild(img);
      });
      calcProfit();
      showToast('انسخ البيانات ثم احفظ');
    }
  }
  function deleteOrder(id) { if(confirm('حذف الطلب؟')) { orders = orders.filter(o => o.id !== id); saveData(); renderAll(); showToast('تم الحذف'); } }

  function calcProfit() {
    let p = (parseFloat(document.getElementById('price').value)||0) - ((parseFloat(document.getElementById('cost').value)||0)+(parseFloat(document.getElementById('shipping').value)||0));
    let span = document.getElementById('liveProfit');
    span.innerText = p.toFixed(2);
    span.style.color = p>=0 ? 'var(--green)' : 'var(--red)';
  }

  function exportData() {
    const dataStr = JSON.stringify(orders, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `temu_orders_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('تم التصدير');
  }

  function importData(input) {
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        let json = e.target.result;
        if(json.charCodeAt(0) === 0xFEFF) json = json.slice(1);
        const data = JSON.parse(json);
        if(Array.isArray(data) && data.length) {
          if(confirm(`سيتم استبدال البيانات الحالية بـ ${data.length} طلب. هل تتابع؟`)) {
            orders = data;
            saveData();
            renderAll();
            showToast('تم الاستيراد بنجاح');
          }
        } else throw new Error('ملف غير صالح');
      } catch(err) { alert('خطأ: الملف تالف أو ليس JSON صحيح'); }
      input.value = '';
    };
    reader.readAsText(file, 'UTF-8');
  }

  function resetAll() { if(confirm('حذف كل البيانات نهائياً؟')) { orders = []; saveData(); renderAll(); showToast('تم مسح الكل'); } }

  function showToast(msg, type='success') {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // عرض الصور المكبرة
  function showImage(src) {
    const viewer = document.getElementById('imageViewer');
    const img = document.getElementById('viewerImg');
    img.src = src;
    viewer.classList.add('open');
    viewer.style.display = 'flex';
  }
  function closeImageViewer() {
    const viewer = document.getElementById('imageViewer');
    viewer.style.display = 'none';
    viewer.classList.remove('open');
  }

  // المساعد الذكي
  function openAIModal() { document.getElementById('aiModal').classList.add('open'); document.getElementById('chatBox').innerHTML = '<div style="background:var(--surface2); padding:8px; border-radius:12px;">مرحباً! اسأل عن إجمالي الربح أو المبيعات.</div>'; }
  function askAI() {
    const input = document.getElementById('chatInput');
    const q = input.value.trim();
    if(!q) return;
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML += `<div style="background:var(--blue); color:#fff; padding:8px; border-radius:12px; align-self:flex-end; margin:4px 0;">${escapeHtml(q)}</div>`;
    input.value = '';
    setTimeout(() => {
      let answer = '';
      const lower = q.toLowerCase();
      const totalProfit = orders.reduce((a,c)=>a+(c.status==='completed'?c.profit:0),0);
      const totalSales = orders.reduce((a,c)=>a+(c.status!=='cancelled'?c.price:0),0);
      if(lower.includes('ربح')) answer = `إجمالي الربح: ${totalProfit.toFixed(2)} درهم.`;
      else if(lower.includes('مبيعات')) answer = `إجمالي المبيعات: ${totalSales.toFixed(2)} درهم.`;
      else answer = 'اسأل عن "الربح" أو "المبيعات"';
      chatBox.innerHTML += `<div style="background:var(--surface2); padding:8px; border-radius:12px; align-self:flex-start; margin:4px 0;">🤖 ${answer}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
    }, 300);
  }

  function toggleTheme() {
    document.body.classList.toggle('light-mode');
    localStorage.setItem('temu_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
  }

  // تهيئة السمة
  if(localStorage.getItem('temu_theme') === 'light') document.body.classList.add('light-mode');

  loadData();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
